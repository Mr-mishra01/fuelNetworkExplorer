org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true

android.useAndroidX=true

# configuration cache disabled — some RN libs call exec() at config time which breaks it
# org.gradle.configuration-cache=true

# arm64 + armeabi covers all real devices; x86/x86_64 are emulator-only
# override at CLI for emulator: ./gradlew assembleDebug -PreactNativeArchitectures=x86_64
reactNativeArchitectures=arm64-v8a,armeabi-v7a

newArchEnabled=true
hermesEnabled=true
edgeToEdgeEnabled=false

# Mapbox SDK download token — add your sk.* token here locally, never commit it
# Get it from: https://account.mapbox.com → Access tokens → Create a secret token
MAPBOX_DOWNLOADS_TOKEN=
